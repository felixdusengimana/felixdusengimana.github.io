name: Build Jekyll Site

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.0'
          bundler-cache: true
      
      - name: Build Jekyll site
        run: bundle exec jekyll build
      
      - name: Check site built successfully
        run: |
          if [ -d "_site" ]; then
            echo "✓ Jekyll site built successfully"
            echo "Site contains $(find _site -type f | wc -l) files"
          else
            echo "✗ Jekyll build failed - _site directory not created"
            exit 1
          fi
